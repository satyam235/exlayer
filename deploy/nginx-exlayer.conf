# Ex-Layer — nginx site config (Ubuntu 24.04)
# Place at /etc/nginx/sites-available/exlayer, then:
#   sudo ln -s /etc/nginx/sites-available/exlayer /etc/nginx/sites-enabled/exlayer
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d exlayer.io -d www.exlayer.io     # adds the 443 block + TLS
server {
    listen 80;
    listen [::]:80;
    server_name exlayer.io www.exlayer.io;     # <-- change to your domain

    root /var/www/exlayer;                      # where dist/ is deployed
    index index.html;

    # ---- compression ----
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/xml application/xml+rss;

    # ---- security headers ----
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ---- hashed build assets: cache hard (filenames change on rebuild) ----
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ---- other static assets ----
    location ~* \.(svg|png|jpg|jpeg|webp|avif|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ---- clean URLs: Astro emits /command-deck/index.html etc. ----
    location / {
        try_files $uri $uri/ =404;
    }

    # ---- HTML: always revalidate so new deploys show immediately ----
    location = / { add_header Cache-Control "no-cache"; }
}
